kind = "web"
previewPath = "/"
title = "Imperial Enterprise"
version = "1.0.0"
id = "artifacts/imperial-enterprise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20805

[services.development]
run = "pnpm --filter @workspace/imperial-enterprise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/imperial-enterprise", "run", "build" ]
publicDir = "artifacts/imperial-enterprise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20805"
BASE_PATH = "/"
